<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>金花樓 · Goldenflower</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#ece3cf;
    --paper-2:#f4ecd7;
    --paper-3:#e0d5bd;
    --sumi:#1a1512;
    --ink-60:rgba(26,21,18,0.6);
    --ink-40:rgba(26,21,18,0.4);
    --ink-15:rgba(26,21,18,0.15);
    --ink-08:rgba(26,21,18,0.08);
    --clay:#b4956b;
    --tea:#4d6b4b;
    --red:#8a2a22;
    --red-2:#6e2019;
    --gold-1:#c69a3a;
    --gold-2:#e8cd78;
    --gold-3:#8a6420;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--sumi);
    font-family:"Cormorant Garamond", "Noto Serif TC", serif;
    -webkit-font-smoothing:antialiased;}
  body{
    background:
      radial-gradient(circle at 50% 0%, rgba(230,205,120,0.10), transparent 55%),
      radial-gradient(circle at 15% 90%, rgba(180,149,107,0.10), transparent 45%),
      radial-gradient(circle at 95% 30%, rgba(138,42,34,0.05), transparent 40%),
      var(--paper);
    min-height:100vh;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(120,90,40,0.05) 1px, transparent 1.5px);
    background-size:4px 4px;
    z-index:0;
  }
  a{color:inherit;text-decoration:none;}
  button{font:inherit;background:none;border:none;color:inherit;cursor:pointer;padding:0;}
  .mono{font-family:"DM Mono", monospace;letter-spacing:2px;text-transform:uppercase;font-size:11px;}
  .italic{font-family:"Cormorant Garamond", serif;font-style:italic;}
  .tc{font-family:"Noto Serif TC", serif;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="site/GoldenFlower.jsx"></script>
<script type="text/babel" src="site/Illustrations.jsx"></script>
<script type="text/babel" src="site/Chrome.jsx"></script>
<script type="text/babel" src="site/About.jsx"></script>
<script type="text/babel" src="site/Products.jsx"></script>
<script type="text/babel" src="site/Process.jsx"></script>
<script type="text/babel" src="site/Shop.jsx"></script>
<script type="text/babel" src="site/App.jsx"></script>

</body>
</html>
